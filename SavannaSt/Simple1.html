<!DOCTYPE html>
<html lang="en">
<head>

<link rel="stylesheet" href="Main.css" />

      <div class="work">
        <img src="artwork-2.jpg" alt="Digital Art" />

    <section class="gallery-section" data-color="#FFE66D">
      <div class="work">
        <img src="artwork-3.jpg" alt="Photography" />

      </div>

    <section class="gallery-section" data-color="#95E1D3">
